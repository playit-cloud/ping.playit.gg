name = "ping-playit-gg"
main = "worker/index.ts"
compatibility_date = "2026-03-16"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[r2_buckets]]
binding = "SHARE_RESULTS_BUCKET"
bucket_name = "playit-ping-results"

[dev]
port = 3000